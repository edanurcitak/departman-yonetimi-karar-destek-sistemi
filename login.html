<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Performans Değerlendirme Sistemi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css" integrity="sha512-IuO+tczf4J43RzbCMEFggCWW5JuX78IrCJRFFBoQEXNvGI6gkUw4OjuwMidiS4Lm9Q2lILzpJwZuMWuSEeT9UQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            background-color: #f4f6f9;
        }
        .login-box {
            width: 400px;
            margin: 60px auto;
        }
        .login-logo a {
            color: #343a40;
            font-size: 2em;
            font-weight: 700;
            text-decoration: none;
        }
        .card {
            border-top: 3px solid #007bff;
            border-radius: 8px;
        }
        .login-card-body {
            padding: 20px 30px;
        }
        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
            font-weight: 600;
        }
        .invalid-feedback {
            color: #e3342f;
            font-size: 0.875em;
            display: none;
        }
    </style>
</head>
<body class="hold-transition login-page">
    <div class="login-box">
        <div class="login-logo">
            <a href="#"><b>Performans</b>Değerlendirme</a>
        </div>
        <div class="card">
            <div class="card-body login-card-body">
                <p class="login-box-msg">Hesabınıza giriş yapın</p>
                
                <form id="loginForm" method="POST" action="backend_login.php">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" placeholder="Kullanıcı Adı" id="username" required>
                        <div class="input-group-append">
                            <div class="input-group-text">
                                <span class="fas fa-user"></span>
                            </div>
                        </div>
                    </div>
                    <div class="input-group mb-3">
                        <input type="password" class="form-control" placeholder="Şifre" id="password" required>
                        <div class="input-group-append">
                            <div class="input-group-text">
                                <span class="fas fa-lock"></span>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary btn-block">Giriş Yap</button>
                        </div>
                    </div>
                </form>
                <div id="loginError" class="invalid-feedback mt-2">
                    Kullanıcı adı veya şifre yanlış.
                </div>
            </div>
        </div>
    </div>
</body>
    <script>
        // Giriş yap fonksiyonu
        function girisYap() {
            // Basit kontrol simülasyonu, backend bağlantısı tamamlandığında güncellenecek
            var username = document.querySelector('input[name="username"]').value;
            var password = document.querySelector('input[name="password"]').value;

            if (username === "admin" && password === "1234") { // Bu, örnek bir kontrol
                window.location.href = "index.html"; // Giriş başarılıysa index.html'e yönlendir
                return false; // Sayfanın yeniden yüklenmesini engeller
            } else {
                document.getElementById("hataMesaji").style.display = "block"; // Hata mesajını göster
                return false; // Formun gönderilmesini engeller
            }
        }
    </script>
</html>
